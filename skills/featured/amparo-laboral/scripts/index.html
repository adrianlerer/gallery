<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 16px; }
.header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #1e293b; }
.title { font-size: 18px; font-weight: 700; color: #00d4aa; }
.subtitle { font-size: 12px; color: #64748b; }
.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat { background: #1e293b; border-radius: 10px; padding: 12px; text-align: center; border: 1px solid #334155; }
.stat-value { font-size: 24px; font-weight: 700; color: #00d4aa; }
.stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }
.card { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #334155; }
.card-date { font-size: 12px; color: #00d4aa; font-weight: 600; margin-bottom: 6px; }
.card-desc { font-size: 14px; color: #cbd5e1; line-height: 1.5; margin-bottom: 10px; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.tag { background: #0f2744; color: #7dd3fc; padding: 3px 8px; border-radius: 20px; font-size: 11px; }
.severity { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #94a3b8; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.s1{background:#22c55e}.s2{background:#84cc16}.s3{background:#f59e0b}.s4{background:#f97316}.s5{background:#ef4444}
.empty { text-align: center; padding: 40px 20px; color: #475569; font-size: 14px; }
.section-title { font-size: 13px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
pre { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 11px; color: #94a3b8; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="title">🛡️ AmparoIA</div>
    <div class="subtitle">Registro de Incidentes</div>
  </div>
</div>
<div id="root"><div class="empty">Cargando...</div></div>

<script>
const KEY = 'amparoia_incidents';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; }
}
function save(list) { localStorage.setItem(KEY, JSON.stringify(list)); }

function parseDate(d) {
  if (!d || d === 'today') return new Date().toISOString().split('T')[0];
  if (d === 'yesterday') { const x = new Date(); x.setDate(x.getDate()-1); return x.toISOString().split('T')[0]; }
  return d;
}

const sevLabel = ['','Muy leve','Leve','Moderado','Severo','Critico'];
const sevClass = ['','s1','s2','s3','s4','s5'];

function handleAction(data) {
  const list = load();

  if (data.action === 'log_incident') {
    const item = {
      id: Date.now().toString(),
      date: parseDate(data.date),
      description: data.description || '',
      tags: Array.isArray(data.tags) ? data.tags : [],
      severity: Math.min(5, Math.max(1, parseInt(data.severity) || 3)),
      createdAt: new Date().toISOString()
    };
    list.unshift(item);
    save(list);
    renderView(null);
    return { result: `Incidente registrado el ${item.date}. Total: ${list.length} incidente(s) guardado(s).` };
  }

  if (data.action === 'get_incidents') {
    const days = parseInt(data.days) || 30;
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
    const filtered = list.filter(i => new Date(i.date) >= cutoff);
    renderView(null);
    return {
      result: `Encontre ${filtered.length} incidente(s) en los ultimos ${days} dias (total historico: ${list.length}).`,
      incidents: filtered
    };
  }

  if (data.action === 'export_incidents') {
    let txt = 'REGISTRO DE INCIDENTES — AmparoIA\n==============================\n';
    txt += `Exportado: ${new Date().toLocaleString('es-AR')}\nTotal: ${list.length} incidente(s)\n\n`;
    list.forEach((inc, i) => {
      txt += `--- Incidente ${i+1} ---\nFecha: ${inc.date}\nSeveridad: ${sevLabel[inc.severity]} (${inc.severity}/5)\nDescripcion: ${inc.description}\n`;
      if (inc.tags.length) txt += `Categorias: ${inc.tags.join(', ')}\n`;
      txt += '\n';
    });
    renderExport(txt);
    return { result: `Registro exportado con ${list.length} incidente(s). Se muestra a continuacion.`, export_text: txt };
  }

  if (data.action === 'wipe_incidents') {
    save([]);
    renderView(null);
    return { result: 'Todos los incidentes fueron eliminados.' };
  }

  renderView(null);
  return { error: 'Accion no reconocida: ' + (data.action || 'ninguna') };
}

function renderView(result) {
  const list = load();
  const thisMonth = list.filter(i => {
    const d = new Date(i.date), n = new Date();
    return d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
  }).length;
  const avg = list.length ? (list.reduce((s,i)=>s+i.severity,0)/list.length).toFixed(1) : '0';

  let html = `<div class="stats">
    <div class="stat"><div class="stat-value">${list.length}</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-value">${thisMonth}</div><div class="stat-label">Este mes</div></div>
    <div class="stat"><div class="stat-value">${avg}</div><div class="stat-label">Sev. media</div></div>
  </div>`;

  if (list.length === 0) {
    html += '<div class="empty">Sin incidentes registrados.<br><small>Pedi al asistente que registre un incidente.</small></div>';
  } else {
    html += '<div class="section-title">Incidentes recientes</div>';
    list.slice(0,15).forEach(inc => {
      html += `<div class="card">
        <div class="card-date">📅 ${inc.date}</div>
        <div class="card-desc">${inc.description}</div>
        ${inc.tags.length ? `<div class="tags">${inc.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
        <div class="severity"><div class="dot ${sevClass[inc.severity]}"></div>${sevLabel[inc.severity]}</div>
      </div>`;
    });
  }
  document.getElementById('root').innerHTML = html;
}

function renderExport(txt) {
  document.getElementById('root').innerHTML = `
    <div class="section-title">Exportar para abogado / denuncia</div>
    <pre>${txt}</pre>`;
}

// Punto de entrada requerido por AI Edge Gallery
window['ai_edge_gallery_get_result'] = async (dataStr) => {
  try {
    const data = JSON.parse(dataStr);
    const result = handleAction(data);
    return JSON.stringify(result);
  } catch (e) {
    renderView(null);
    return JSON.stringify({ error: 'Error: ' + e.message });
  }
};

// Render inicial (cuando se abre el webview sin accion)
renderView(null);
</script>
</body>
</html>
